<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 140" width="1000" height="140" id="game-of-lands">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="40%" stop-color="#d4b450"/>
      <stop offset="100%" stop-color="#8a7530"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffeaa0"/>
      <stop offset="100%" stop-color="#a08020"/>
    </linearGradient>
  </defs>

  <!-- GAME -->
  <text x="500" y="72" text-anchor="middle"
    font-family="'Cinzel Decorative', 'Cinzel', 'Trajan Pro', 'Times New Roman', serif"
    font-weight="900" font-size="80" letter-spacing="12"
    fill="url(#goldGrad)" stroke="url(#goldStroke)" stroke-width="1.2">
    GAME
  </text>

  <!-- OF -->
  <text x="500" y="102" text-anchor="middle"
    font-family="'Cinzel', 'Trajan Pro', 'Times New Roman', serif"
    font-weight="400" font-size="24" letter-spacing="18"
    fill="#c8a848" opacity="0.85">
    OF
  </text>

  <!-- LANDS -->
  <text x="500" y="135" text-anchor="middle"
    font-family="'Cinzel Decorative', 'Cinzel', 'Trajan Pro', 'Times New Roman', serif"
    font-weight="900" font-size="56" letter-spacing="16"
    fill="url(#goldGrad)" stroke="url(#goldStroke)" stroke-width="1">
    LANDS
  </text>

  <!-- Decorative lines -->
  <line x1="180" y1="84" x2="430" y2="84" stroke="#c8a848" stroke-width="0.8" opacity="0.5"/>
  <line x1="570" y1="84" x2="820" y2="84" stroke="#c8a848" stroke-width="0.8" opacity="0.5"/>
  <circle cx="175" cy="84" r="2" fill="#c8a848" opacity="0.5"/>
  <circle cx="825" cy="84" r="2" fill="#c8a848" opacity="0.5"/>

  <!-- Small diamond accents -->
  <polygon points="430,84 435,80 440,84 435,88" fill="#d4b450" opacity="0.6"/>
  <polygon points="560,84 565,80 570,84 565,88" fill="#d4b450" opacity="0.6"/>
</svg>
